name: Job Hunter Agent new

on:
  schedule:
    # 18:02 WIB (11:02 UTC) untuk testing
    - cron: '*/5 * * * *'
  workflow_dispatch: # Memungkinkan trigger manual

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper_project

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

    - name: Install Playwright Browsers with Deps
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        playwright install chromium --with-deps

    - name: Install Playwright System Deps Only
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: |
        playwright install-deps chromium

    - name: Run Job Hunter Pipeline
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        PYTHONPATH: .
      run: |
        python src/main.py
