name: Manual workflow

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Person to greet'
        default: 'World'
        required: true
        type: string

  schedule:
    - cron: '* * * * *'

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Send greeting
        run: |
          echo "Hello ${{ github.event.inputs.name || 'World' }}"
