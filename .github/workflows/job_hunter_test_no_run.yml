name: Job Hunter Agent - PIPELINE TEST ONLY

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  scheduled:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Print Environment Info
        run: |
          echo "=== SYSTEM INFO ==="
          python --version
          pip --version
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -R

      - name: Install Dependencies (NO RUN)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers (NO EXEC)
        run: |
          python -m playwright install chromium

      - name: Test Import Only (NO MAIN EXECUTION)
        run: |
          python -c "import src; print('✅ IMPORT SUCCESS')"

      - name: Final Check
        run: |
          echo "✅ WORKFLOW PIPELINE SUCCESS (NO APP RUN)"